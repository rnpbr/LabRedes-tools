# =============================================================================
# AGENT
# =============================================================================
[agent]
  interval = "60s"
  flush_interval = "10s"
  skip_processors_after_aggregators = false

# =============================================================================
# INPUTS
# =============================================================================

# -----------------------------------------------------------------------------
# SNMP
# -----------------------------------------------------------------------------
[[inputs.snmp]]
  agents = [
    "udp://172.10.10.10:161",
    "udp://172.10.10.11:161",
    "udp://172.10.10.12:161",
    "udp://172.10.10.13:161",
  ]
  version   = 2
  community = "public"
  name      = "Lab"
  timeout   = "10s"

  # Tag com o IP de origem do agente
  agent_host_tag = "source"

  # -- Campos escalares --------------------------------------------------------

  # Hostname do dispositivo
  [[inputs.snmp.field]]
    name   = "hostname"
    oid    = "RFC1213-MIB::sysName.0"
    is_tag = true

  # Uptime do dispositivo
  [[inputs.snmp.field]]
    name = "uptime"
    oid  = "DISMAN-EXPRESSION-MIB::sysUpTimeInstance"

  # Endereço IP da interface
  [[inputs.snmp.field]]
    name = "interface_ip"
    oid  = "IP-MIB::ipAdEntAddr"

  # Máscara de rede da interface
  [[inputs.snmp.field]]
    name = "interface_netmask"
    oid  = "IP-MIB::ipAdEntNetMask"

  # Índice da interface associada ao IP
  [[inputs.snmp.field]]
    name = "interface_index"
    oid  = "IP-MIB::ipAdEntIfIndex"

  # -- Tabelas ---------------------------------------------------------------

  # IF-MIB::ifTable — contadores de tráfego, erros e descartes
  [[inputs.snmp.table]]
    name         = "interface"
    inherit_tags = ["hostname"]
    oid          = "IF-MIB::ifTable"

    [[inputs.snmp.table.field]]
      name   = "ifDescr"
      oid    = "IF-MIB::ifDescr"
      is_tag = true

    # Endereço MAC — usando displayhint (substitui hwaddr depreciado)
    [[inputs.snmp.table.field]]
      name       = "ifPhysAddress"
      oid        = "IF-MIB::ifPhysAddress"
      conversion = "displayhint"

  # IF-MIB::ifXTable — contadores de alta capacidade (64-bit)
  [[inputs.snmp.table]]
    name         = "interface"
    inherit_tags = ["hostname"]
    oid          = "IF-MIB::ifXTable"

    [[inputs.snmp.table.field]]
      name   = "ifDescr"
      oid    = "IF-MIB::ifDescr"
      is_tag = true

  # EtherLike-MIB::dot3StatsTable — estatísticas detalhadas de erros Ethernet
  [[inputs.snmp.table]]
    name         = "interface"
    inherit_tags = ["hostname"]
    oid          = "EtherLike-MIB::dot3StatsTable"

    [[inputs.snmp.table.field]]
      name   = "ifDescr"
      oid    = "IF-MIB::ifDescr"
      is_tag = true

# -----------------------------------------------------------------------------
# Netflow / IPFIX
# -----------------------------------------------------------------------------
[[inputs.netflow]]
  service_address = "udp://:2055"
  # protocol      = "ipfix"   # ipfix | netflow v5 | netflow v9 | sflow v5
  # read_buffer_size = "64KiB"
  # private_enterprise_number_files = []
  # log_level = "trace"

# -----------------------------------------------------------------------------
# Syslog
# -----------------------------------------------------------------------------
[[inputs.syslog]]
  server = "tcp://0.0.0.0:514"

# =============================================================================
# PROCESSORS
# =============================================================================

# Converte campos do Netflow em tags para facilitar filtragem no InfluxDB
[[processors.converter]]
  [processors.converter.fields]
    tag = ["protocol", "src", "src_port", "dst", "dst_port"]

# =============================================================================
# OUTPUTS
# =============================================================================

[[outputs.influxdb]]
  urls                  = ["http://influxdb:8086"]
  database              = "telemetry"
  password              = "admin"
  skip_database_creation = true